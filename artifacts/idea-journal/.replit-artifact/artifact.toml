kind = "web"
previewPath = "/"
title = "Idea Journal"
version = "1.0.0"
id = "artifacts/idea-journal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20671

[services.development]
run = "pnpm --filter @workspace/idea-journal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/idea-journal", "run", "build" ]
publicDir = "artifacts/idea-journal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20671"
BASE_PATH = "/"
